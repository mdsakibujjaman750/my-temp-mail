# DropMail — Netlify Configuration
# Place this file in the root of your project

[build]
  # No build step needed — pure static + functions
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Redirect API calls to the serverless function
[[redirects]]
  from  = "/.netlify/functions/*"
  to    = "/.netlify/functions/:splat"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-XSS-Protection          = "1; mode=block"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "no-referrer"
    Permissions-Policy        = "geolocation=(), camera=(), microphone=()"
    Content-Security-Policy   = "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.tailwindcss.com; script-src 'self' https://cdn.tailwindcss.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; img-src * data:; connect-src 'self';"
