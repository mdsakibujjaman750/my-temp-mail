<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEMP MAIL PRO | by SAKIB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
        
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        
        body { 
            background: linear-gradient(-45deg, #192a56, #273c75, #ff4757, #ff6b81, #5f27cd);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 15px; 
            color: #333;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .container { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            padding: 25px 20px; border-radius: 20px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.3); 
            width: 100%; max-width: 550px; text-align: center; 
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }

        h1 { 
            background: linear-gradient(to right, #ff4757, #5f27cd, #2ed573);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px; font-weight: 800; font-size: 1.8rem; 
            text-transform: uppercase; letter-spacing: 1px;
        }
        
        .mail-generator { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .mail-generator input { 
            padding: 10px 15px; border: 2px solid #dfe4ea; border-radius: 12px; font-size: 0.95rem; outline: none; 
            background: #ffffff; transition: all 0.3s ease; font-weight: 600; flex: 1; min-width: 140px; color: #2f3542; 
        }
        .mail-generator input:focus { border-color: #5f27cd; box-shadow: 0 0 10px rgba(95, 39, 205, 0.2); }
        
        .dropdown { position: relative; width: 100%; max-width: 180px; text-align: left; }
        .dropdown-selected { 
            background: #fff; padding: 10px 15px; border-radius: 12px; border: 2px solid #dfe4ea; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; 
            font-weight: 600; font-size: 0.95rem; color: #5f27cd; transition: 0.3s;
        }
        .dropdown.active .dropdown-selected { border-color: #5f27cd; }
        .dropdown-options { 
            position: absolute; top: 110%; left: 0; right: 0; background: #fff; 
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            opacity: 0; transform: translateY(-10px); pointer-events: none; 
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 100; overflow: hidden; border: 1px solid #dfe4ea;
            max-height: 200px; overflow-y: auto;
        }
        .dropdown.active .dropdown-options { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .dropdown-option { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #f1f2f6; font-weight: 500; font-size: 0.9rem; color: #2f3542; }
        .dropdown-option:hover { background: #f1f2f6; color: #ff4757; padding-left: 20px; }

        .mail-box-wrapper { position: relative; margin-bottom: 25px; display: inline-block; width: 100%; }
        .mail-box { 
            background: linear-gradient(135deg, #2f3542 0%, #1e272e 100%);
            padding: 15px; border-radius: 15px; font-size: 1.25rem; font-weight: 700; color: #2ed573; 
            word-break: break-all; border: 3px solid #2ed573; cursor: pointer; 
            transition: all 0.3s; box-shadow: 0 10px 20px rgba(46, 213, 115, 0.2); position: relative; overflow: hidden;
        }
        .mail-box::before { content: "📋 CLICK TO COPY"; position: absolute; top: 0; left: 0; right: 0; background: rgba(46, 213, 115, 0.95); color: #fff; font-size: 0.8rem; padding: 3px; transform: translateY(-100%); transition: 0.3s; }
        .mail-box:hover::before { transform: translateY(0); }
        .mail-box:active { transform: scale(0.95); } 
        
        .btn-group { display: flex; gap: 8px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        button { 
            padding: 10px 15px; border: none; border-radius: 10px; cursor: pointer; 
            font-weight: 700; font-size: 0.85rem; transition: all 0.3s ease; 
            text-transform: uppercase; letter-spacing: 0.5px; flex: 1; min-width: 100px; color: white;
        }
        .btn-refresh { background: linear-gradient(135deg, #1e90ff 0%, #5f27cd 100%); box-shadow: 0 5px 15px rgba(95, 39, 205, 0.3); }
        .btn-random { background: linear-gradient(135deg, #ffa502 0%, #ff6348 100%); box-shadow: 0 5px 15px rgba(255, 165, 2, 0.3); }
        .btn-copy { background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%); box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3); }
        button:hover { transform: translateY(-3px); opacity: 0.9; }
        button:active { transform: translateY(1px); }
        
        .inbox { background: rgba(241, 242, 246, 0.9); padding: 15px; border-radius: 15px; border: 2px solid #dfe4ea; transition: 0.3s; }
        
        @keyframes pulseNewMail { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.02); border-color: #2ed573; box-shadow: 0 0 20px rgba(46, 213, 115, 0.5); } 
            100% { transform: scale(1); } 
        }
        .inbox.new-mail-alert { animation: pulseNewMail 1s ease-out; }

        .inbox-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ced6e0; padding-bottom: 10px; margin-bottom: 15px; }
        .inbox-header h3 { margin: 0; color: #2f3542; font-size: 1.2rem; font-weight: 800; }
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255, 71, 87, 0.3); border-top: 3px solid #ff4757; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        
        #emailList { text-align: left; max-height: 280px; overflow-y: auto; padding-right: 5px; }
        .email-item { 
            background: #ffffff; padding: 12px 15px; border: 1px solid #dfe4ea; 
            margin-bottom: 10px; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; 
            border-left: 5px solid #2ed573; position: relative;
        }
        .email-item:hover { transform: translateX(5px); border-left-color: #ff4757; }
        .email-subject { font-weight: 700; color: #2f3542; font-size: 1rem; display: block; margin-bottom: 3px; }
        .email-sender { color: #57606f; font-size: 0.85rem; font-weight: 600; }
        .new-badge { position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; padding: 2px 6px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; animation: pulseBadge 1.5s infinite; }
        
        @keyframes pulseBadge { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        #messageView { display: none; text-align: left; background: #fff; border: 1px solid #dfe4ea; padding: 20px; border-radius: 15px; margin-top: 10px; }
        .back-btn { background: #ced6e0; color: #2f3542; padding: 8px 15px; margin-bottom: 15px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; font-size: 0.85rem; }
        .back-btn:hover { background: #5f27cd; color: white; }
        
        #toast { visibility: hidden; min-width: 250px; background: linear-gradient(to right, #2ed573, #1e90ff); color: #fff; text-align: center; border-radius: 20px; padding: 12px 20px; position: fixed; z-index: 1000; left: 50%; bottom: 20px; transform: translateX(-50%) translateY(20px); font-weight: 700; opacity: 0; transition: all 0.4s ease; font-size: 1rem; border: 2px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
        
        .empty-state { text-align: center; padding: 30px 10px; color: #747d8c; font-weight: 600; font-size: 1rem; }
        .empty-state span { font-size: 2.5rem; display: block; margin-bottom: 10px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-10px); } 60% { transform: translateY(-5px); } }

        .footer { margin-top: 20px; padding-top: 15px; border-top: 2px dashed rgba(206, 214, 224, 0.8); font-size: 0.95rem; font-weight: 800; color: #2f3542; text-transform: uppercase; letter-spacing: 1px; }
        .footer span { color: #ff4757; font-size: 1.1rem; }
        
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #f1f2f6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #5f27cd; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>TEMP MAIL PRO</h1>
    
    <div class="mail-generator">
        <input type="text" id="usernameInput" placeholder="Custom name">
        
        <div class="dropdown" id="domainDropdown" onclick="toggleDropdown()">
            <div class="dropdown-selected" id="selectedDomainText">
                Loading... <i style="font-style: normal; margin-left: 8px; font-size: 0.8rem;">▼</i>
            </div>
            <div class="dropdown-options" id="dropdownOptions">
                </div>
        </div>
    </div>

    <div class="mail-box-wrapper">
        <div class="mail-box" id="mailAddress" onclick="copyMail()">
            Loading Email...
        </div>
    </div>
    
    <div class="btn-group">
        <button class="btn-refresh" onclick="setNewMail()">🔄 CHANGE</button>
        <button class="btn-random" onclick="generateRandomMail()">🎲 RANDOM</button>
        <button class="btn-copy" onclick="copyMail()">📋 COPY</button>
    </div>

    <div class="inbox" id="inboxContainer">
        <div class="inbox-header">
            <h3>📥 LIVE INBOX</h3>
            <div class="spinner" id="loadingSpinner"></div>
        </div>
        
        <div id="emailList">
            <div class="empty-state"><span>📭</span>Waiting for emails...</div>
        </div>
        
        <div id="messageView">
            <button class="back-btn" onclick="backToInbox()">⬅️ BACK</button>
            <h2 id="msgSubject" style="margin-top:0; color: #2f3542; font-size: 1.3rem; font-weight: 800; margin-bottom: 5px;"></h2>
            <p id="msgSender" style="color:#57606f; font-size:0.9rem; font-weight: 600; border-bottom:2px dashed #ced6e0; padding-bottom:10px; margin-bottom: 15px;"></p>
            <div id="msgBody" style="overflow-x: auto; color: #2f3542; line-height: 1.6; font-size: 0.95rem; background: #f1f2f6; padding: 15px; border-radius: 12px; border: 1px solid #dfe4ea;"></div>
        </div>
    </div>

    <div class="footer">
        ©2026 | developer <span>SAKIB</span>
    </div>
</div>

<div id="toast">✨ Copied!</div>
<audio id="notificationSound" src="https://www.myinstants.com/media/sounds/ting.mp3" preload="auto"></audio>

<script>
    let currentEmail = "";
    let checkInterval;
    let selectedDomainVal = "1secmail.com";
    let knownMessageIds = []; 

    // ১. Page Load & Local Storage Check
    document.addEventListener("DOMContentLoaded", async () => {
        try {
            const res = await fetch("https://www.1secmail.com/api/v1/?action=getDomainList");
            const domains = await res.json();
            if(domains && domains.length > 0) {
                populateDomains(domains);
            } else {
                fallbackDomains();
            }
        } catch (e) {
            fallbackDomains(); 
        }
    });

    function fallbackDomains() {
        populateDomains(['1secmail.com', '1secmail.org', '1secmail.net', 'kzccv.com', 'qiott.com', 'wuuvo.com']);
    }

    function populateDomains(domains) {
        const dropdownOptions = document.getElementById("dropdownOptions");
        dropdownOptions.innerHTML = "";
        domains.forEach(domain => {
            dropdownOptions.innerHTML += `<div class="dropdown-option" onclick="selectDomain('${domain}')">${domain}</div>`;
        });

        // Local Storage থেকে আগের মেইল চেক করা
        let savedUser = localStorage.getItem("tempMailUser");
        let savedDomain = localStorage.getItem("tempMailDomain");

        if (savedUser && savedDomain && domains.includes(savedDomain)) {
            document.getElementById("usernameInput").value = savedUser;
            selectedDomainVal = savedDomain;
            document.getElementById("selectedDomainText").innerHTML = savedDomain + ' <i style="font-style: normal; margin-left: 8px; font-size: 0.8rem;">▼</i>';
            setNewMail(false); // false মানে নতুন করে রেন্ডম নাম বানাবে না, সেভ করাটাই নেবে
        } else {
            selectedDomainVal = domains[0];
            document.getElementById("selectedDomainText").innerHTML = selectedDomainVal + ' <i style="font-style: normal; margin-left: 8px; font-size: 0.8rem;">▼</i>';
            generateRandomMail(); 
        }
    }

    function toggleDropdown() { document.getElementById("domainDropdown").classList.toggle("active"); }

    function selectDomain(domain) {
        selectedDomainVal = domain;
        document.getElementById("selectedDomainText").innerHTML = domain + ' <i style="font-style: normal; margin-left: 8px; font-size: 0.8rem;">▼</i>';
        setNewMail(true); // true মানে ইনপুট থেকে নাম নেবে
    }

    window.addEventListener('click', function(e) {
        if (!document.getElementById('domainDropdown').contains(e.target)) {
            document.getElementById('domainDropdown').classList.remove('active');
        }
    });

    // ২. Random Mail Button Logic
    function generateRandomMail() {
        let randomString = Math.random().toString(36).substring(2, 10);
        document.getElementById("usernameInput").value = randomString;
        setNewMail(true);
    }

    // ৩. Set Mail and Save to Local Storage
    function setNewMail(readFromInput = true) {
        let user = document.getElementById("usernameInput").value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
        
        if (!user || !readFromInput) {
            user = document.getElementById("usernameInput").value; 
            if(!user) {
                user = Math.random().toString(36).substring(2, 10);
                document.getElementById("usernameInput").value = user;
            }
        }
        
        currentEmail = `${user}@${selectedDomainVal}`;
        document.getElementById("mailAddress").innerText = currentEmail;
        knownMessageIds = []; 
        
        // Save to Local Storage (যেন রিলোড দিলে না হারায়)
        localStorage.setItem("tempMailUser", user);
        localStorage.setItem("tempMailDomain", selectedDomainVal);
        
        backToInbox();
        checkInbox();
        
        if (checkInterval) clearInterval(checkInterval);
        checkInterval = setInterval(checkInbox, 5000);
    }

    function copyMail() {
        navigator.clipboard.writeText(currentEmail);
        const mailBox = document.getElementById("mailAddress");
        mailBox.style.transform = "scale(0.95)";
        setTimeout(() => mailBox.style.transform = "scale(1)", 150);
        const toast = document.getElementById("toast");
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2000);
    }

    async function checkInbox() {
        if (!currentEmail || currentEmail.includes("Loading")) return;
        const [login, domain] = currentEmail.split("@");
        document.getElementById("loadingSpinner").style.display = "block";
        
        try {
            const res = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${login}&domain=${domain}`);
            const messages = await res.json();
            
            const currentIds = messages.map(m => m.id);
            const newMailsCount = currentIds.filter(id => !knownMessageIds.includes(id)).length;

            if (knownMessageIds.length > 0 && newMailsCount > 0) {
                document.getElementById("notificationSound").play().catch(e => console.log("Sound error"));
                const inboxBox = document.getElementById("inboxContainer");
                inboxBox.classList.add("new-mail-alert");
                setTimeout(() => inboxBox.classList.remove("new-mail-alert"), 1000);
            }
            
            knownMessageIds = currentIds; 
            
            if (document.getElementById("messageView").style.display !== "block") {
                let html = "";
                if (messages.length === 0) {
                    html = `<div class="empty-state"><span>⌛</span>Waiting for emails...<br><small style="font-size:0.85rem;">Auto-refreshing every 5s</small></div>`;
                } else {
                    messages.forEach((msg, index) => {
                        let isNew = index < newMailsCount ? `<div class="new-badge">NEW</div>` : "";
                        html += `<div class="email-item" onclick="readMessage(${msg.id})">
                            ${isNew}
                            <span class="email-subject">${msg.subject || 'No Subject'}</span>
                            <span class="email-sender">👤 ${msg.from}</span>
                        </div>`;
                    });
                }
                document.getElementById("emailList").innerHTML = html;
            }
        } catch (error) {
            console.log("Fetching inbox...");
        } finally {
            document.getElementById("loadingSpinner").style.display = "none";
        }
    }

    async function readMessage(msgId) {
        const [login, domain] = currentEmail.split("@");
        document.getElementById("emailList").style.display = "none";
        document.getElementById("messageView").style.display = "block";
        document.getElementById("msgBody").innerHTML = `<div class="empty-state">Loading message...</div>`;
        
        try {
            const res = await fetch(`https://www.1secmail.com/api/v1/?action=readMessage&login=${login}&domain=${domain}&id=${msgId}`);
            const msgData = await res.json();
            document.getElementById("msgSubject").innerText = msgData.subject || 'No Subject';
            document.getElementById("msgSender").innerText = `From: ${msgData.from}`;
            
            if (msgData.htmlBody) {
                document.getElementById("msgBody").innerHTML = msgData.htmlBody;
            } else {
                document.getElementById("msgBody").innerText = msgData.textBody;
            }
        } catch (error) {
            document.getElementById("msgBody").innerHTML = "<div style='color:red;'>Error loading content.</div>";
        }
    }

    function backToInbox() {
        document.getElementById("messageView").style.display = "none";
        document.getElementById("emailList").style.display = "block";
        checkInbox();
    }

    document.getElementById("usernameInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") { setNewMail(true); }
    });
</script>

</body>
</html>
