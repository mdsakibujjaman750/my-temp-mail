<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DropMail \u2014 Instant Temporary Email</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cyan: #00e5ff;
      --cyan-dim: #00b8cc;
      --navy: #080d1a;
      --navy-2: #0d1526;
      --navy-3: #111d35;
      --navy-4: #162040;
      --card: #0f1a30;
      --border: rgba(0,229,255,0.12);
      --border-hover: rgba(0,229,255,0.3);
      --text: #c8d8f0;
      --text-dim: #6a80a0;
      --green: #00ffaa;
      --red: #ff4d6a;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: var(--navy);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(0,100,180,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .glow-orb {
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(ellipse, rgba(0,229,255,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 16px 80px;
    }

    /* Header */
    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px 6px 8px;
      background: rgba(0,229,255,0.07);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 13px;
      color: var(--cyan);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.04em;
      margin-bottom: 32px;
    }

    .logo-badge .dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 700;
      color: #fff;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    h1 span { color: var(--cyan); }

    .subtitle {
      color: var(--text-dim);
      font-size: 15px;
      font-weight: 300;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    /* Email card */
    .email-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .email-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.5;
    }

    .email-label {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .email-address-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
      transition: border-color 0.3s;
    }

    .email-address-wrap:hover { border-color: var(--border-hover); }

    #emailAddress {
      flex: 1;
      font-family: 'Space Mono', monospace;
      font-size: clamp(13px, 3vw, 17px);
      color: var(--cyan);
      word-break: break-all;
      letter-spacing: 0.02em;
      user-select: all;
    }

    .email-spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      outline: none;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--cyan);
      color: var(--navy);
      border-color: var(--cyan);
    }
    .btn-primary:hover {
      background: #33eaff;
      box-shadow: 0 0 20px rgba(0,229,255,0.35);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--border-hover);
      color: #fff;
      background: rgba(0,229,255,0.06);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0) scale(0.98); }

    .btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* Copy toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--green);
      color: #080d1a;
      font-weight: 600;
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 100px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 4px 24px rgba(0,255,170,0.3);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Inbox */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .section-title {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .count-badge {
      background: var(--cyan);
      color: var(--navy);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 100px;
      display: none;
    }

    .poll-status {
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .poll-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    /* Inbox list */
    #inboxList { display: flex; flex-direction: column; gap: 8px; }

    .empty-state {
      text-align: center;
      padding: 56px 24px;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: 16px;
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 16px;
      opacity: 0.4;
      display: block;
    }

    .empty-state h3 {
      margin: 0 0 8px;
      color: var(--text);
      font-size: 16px;
      font-weight: 500;
    }

    .empty-state p {
      margin: 0;
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.6;
    }

    .mail-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 12px;
      align-items: center;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .mail-item:hover {
      border-color: var(--border-hover);
      background: var(--navy-3);
      transform: translateX(4px);
    }

    .mail-item.unread { border-left: 3px solid var(--cyan); }

    .mail-from {
      font-weight: 600;
      font-size: 14px;
      color: #fff;
      truncate: true;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mail-subject {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      grid-column: 1;
    }

    .mail-date {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--text-dim);
      grid-row: 1 / 3;
      grid-column: 2;
      align-self: center;
      white-space: nowrap;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,13,26,0.85);
      backdrop-filter: blur(8px);
      z-index: 100;
      padding: 20px;
      overflow-y: auto;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 700px;
      margin: auto;
      overflow: hidden;
      animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.94) translateY(16px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .modal-meta { flex: 1; min-width: 0; }

    .modal-subject {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin: 0 0 12px;
      line-height: 1.3;
    }

    .meta-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .meta-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      min-width: 32px;
    }

    .meta-value { color: var(--text); word-break: break-all; }

    .btn-close {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 18px;
    }
    .btn-close:hover { background: rgba(255,77,106,0.15); border-color: var(--red); color: var(--red); }

    .modal-body {
      padding: 24px 28px;
      max-height: 60vh;
      overflow-y: auto;
    }

    .mail-body-html {
      color: var(--text);
      font-size: 14px;
      line-height: 1.7;
    }

    .mail-body-html * { max-width: 100%; }
    .mail-body-html a { color: var(--cyan); }
    .mail-body-html img { border-radius: 6px; margin: 8px 0; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

    /* Timer bar */
    .timer-bar-wrap {
      height: 2px;
      background: rgba(0,229,255,0.08);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 16px;
    }

    .timer-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      border-radius: 1px;
      transition: width 1s linear;
    }

    /* Responsive */
    @media (max-width: 520px) {
      .btn-row { flex-direction: column; }
      .btn { justify-content: center; }
      .modal-body { max-height: 50vh; }
      .modal-header { padding: 18px 18px 16px; }
      .modal-body { padding: 18px; }
    }
  </style>
</head>
<body>

<div class="glow-orb"></div>

<div class="wrapper">

  <!-- Header -->
  <div class="logo-badge">
    <span class="dot"></span>
    DROP<span style="opacity:0.5">MAIL</span>
  </div>

  <h1>Instant <span>Temp Mail</span><br>No signup. No trace.</h1>
  <p class="subtitle">
    Get a disposable inbox in seconds. Share it anywhere, stay protected.<br>
    Emails auto-appear below. Address expires when you leave.
  </p>

  <!-- Email Address Card -->
  <div class="email-card">
    <div class="email-label">// Your temporary address</div>
    <div class="email-address-wrap">
      <div id="emailAddress">Generating address...</div>
      <div class="email-spinner" id="genSpinner"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="copyEmail()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a
